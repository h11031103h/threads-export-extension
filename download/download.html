<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>CSV ダウンロード - すれっしゅ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      background: #1c1c1e;
      color: #f5f5f7;
      text-align: center;
      margin: 0;
    }
    p { color: #aeaeb2; margin: 8px 0; }
    a.dl {
      display: inline-block;
      margin: 16px 0;
      padding: 12px 24px;
      background: #0a84ff;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    a.dl:hover { background: #409cff; }
    .filename-wrap { margin: 12px 0; }
    .filename-link { font-size: 14px; color: #0a84ff; text-decoration: none; word-break: break-all; }
    .filename-link:hover { text-decoration: underline; }
    .hint { font-size: 11px; color: #6e6e73; margin-top: 8px; }
  </style>
</head>
<body>
  <p id="msg">準備中...</p>
  <div id="filename-wrap" class="filename-wrap" style="display:none;">
    <a id="filename" class="filename-link" href="#">threads_posts_xxx.csv</a>
    <p class="hint">クリックで「名前を付けて保存」が開き、ファイル名が自動で入ります（Chrome 86 以上）</p>
  </div>
  <script src="download.js"></script>
</body>
</html>
