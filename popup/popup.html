<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>すれっしゅ</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <h1 class="popup-title">すれっしゅ</h1>
    <p class="popup-desc">Threads の検索ページまたはタイムラインで開くと、画面右上にパネルが表示されます。</p>
    <ul class="popup-steps">
      <li>Threads の検索ページを開く</li>
      <li>「純粋ポストのみ収集」で引用・リプライを除外</li>
      <li>スクロールしてポストを収集</li>
      <li>「Download CSV」でダウンロード</li>
    </ul>
    <button type="button" class="popup-link" id="open-search">Threads 検索を開く</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
